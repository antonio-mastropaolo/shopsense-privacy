name: Deploy privacy policy to Pages

on:
  push:
    branches: [main]
    paths:
      - "PRIVACY.md"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Render PRIVACY.md to HTML
        run: |
          mkdir -p _site
          pip install markdown
          python - <<'PY'
          import markdown, pathlib
          md = pathlib.Path("PRIVACY.md").read_text()
          body = markdown.markdown(md, extensions=["tables", "fenced_code"])
          html = f"""<!doctype html>
          <html lang="en"><head>
            <meta charset="utf-8">
            <title>Shopsense Privacy Policy</title>
            <meta name="viewport" content="width=device-width,initial-scale=1">
            <style>
              body{{font:16px/1.6 system-ui,sans-serif;max-width:720px;margin:40px auto;padding:0 20px;color:#222}}
              h1,h2,h3{{line-height:1.25}}
              h1{{border-bottom:2px solid #222;padding-bottom:8px}}
              a{{color:#0a64e6}}
              code{{background:#f2f2f2;padding:1px 4px;border-radius:3px}}
            </style>
          </head><body>
          {body}
          </body></html>"""
          pathlib.Path("_site/PRIVACY.html").write_text(html)
          pathlib.Path("_site/index.html").write_text(html)
          PY

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
